<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON 읽기</title>
</head>
<body>
	<input type="button" value="json 읽기" onclick="load('ex03_json.json')">
	<div id="area"></div>
	<script type="text/javascript">
		function load(url){
			const xhttp = new XMLHttpRequest();
			xhttp.open("GET", url);
			xhttp.send();
			xhttp.onreadystatechange=callback;
		}
		function callback(){
			if(this.readyState == 4 && this.status == 200){
				let area = document.querySelector("#area");
				/*
				this.responseText :
					[
						{"author":{"book":"ajax","pubDate":"2026-01-01"}},
						{"author":{"book":"자바","pubDate":"2026-02-01"}},
						{"author":{"book":"웹","pubDate":"2026-03-01"}}
					]
				
				배열 : []
				객체 : {}
				
				JSON.parse : 문자열을 배열객체로 변경. 문자열 → 자바스크립트 객체
				data : 배열 객체
				*/
				let data = JSON.parse(this.responseText);
				for(s of data){
					// s : {"author":{"book":"ajax","pubDate":"2026-01-01"}}
					// s.autor : {"book":"ajax","pubDate":"2026-01-01"}
					// s.author.book : "ajax"
					// s.author.pubDate : "2026-01-01"
					area.innerHTML += "<p>" + s.author.book + ":" + s.author.pubDate + "</p>";
				}
				area.innerHTML +="<hr>";
				area.innerHTML += "<p>" + data[0].author.book + ":" + data[0].author.pubDate + "</p>";
				area.innerHTML += "<p>" + data[1].author.book + ":" + data[1].author.pubDate + "</p>";
				area.innerHTML += "<p>" + data[2].author.book + ":" + data[2].author.pubDate + "</p>";
			}
		}
	</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>fetch : 파라미터 전달</title>
</head>
<body>
	<h2>fetch 함수 이용</h2>
	<form name="f">
		<input type="text" name="name">
		<button type="button" onclick="loadJspGet()">입력(Get)</button>
		<button type="button" onclick="loadJspPost()">입력(Post)</button>
		<div id="demo"></div>
		<script type="text/javascript">
	function loadJspGet(){
		fetch("ex02_basic.jsp?name=" + document.f.name.value) // 파라미터는 URL에 붙여서 전달
		.then((r)=>r.text())
		.then((data)=>document.querySelector("#demo").innerHTML=data)
	}
	function loadJspPost() {
		fetch("ex02_basic.jsp", {
			method : "POST",
			headers : {"Content-Type":"application/x-www-form-urlencoded;charset=UTF-8"},
			body : "name=" + document.f.name.value // POST 방식에서 파라미터 전달 방식
		})
		.then((r)=>r.text())
		.then((data)=>document.querySelector("#demo").innerHTML=data);
	}
		</script>
	</form>
</body>
</html>

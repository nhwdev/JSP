<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>jQuery 개요</title>
</head>
<body>
	<h1>jQuery 개요</h1>
	<h3>jQuery 란</h3>
	<p>
		기존의 자바스크립트 만으로 구현하기 복잡했던 구문들을 간소화하도록 만들어진 JavaScript 기반 라이브러리<br>
		jQuery 공식 사이트 : <a href="http://jquery.com" target="_blank">공식 사이트</a>
	</p>
	<!-- CDN 방식 -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script type="text/javascript">
		/*
		 * window.onload
		 * 	- window 로드시 발생되는 이벤트
		 *	- html 문서내에서 한번만. 실행 마지막에 기술된 함수만 실행.
		 */
		window.onload = function() {
			console.log("window.onload 구문 실행 됨 -> 첫번째") // 실행 안됨
		}
		window.onload = function() {
			console.log("window.onload 구문 실행 됨 -> 두번째") // 실행됨
		}
		/*
		 * jQuery 방식
		 * 	1) jQuery(document).ready(function(){실행 내용})
		 * 	2) $(document).ready(function(){실행 내용})
		 *	3) $(function(){실행 내용})
		 *
		 *	- 순서대로 전부 실행
		 *	- 해당 문서의 요소들이 로드되면 실행
		 */
		jQuery(document).ready(function() {
			console.log("document ready 구문 실행됨 1")
		})
		jQuery(document).ready(function() {
			console.log("document ready 구문 실행됨 2")
		})
		$(document).ready(function() {
			console.log("document ready 구문 실행됨 3")
		})
		$(function() {
			console.log("document ready 구문 실행됨 4")
			/*
			// 자바스크립트 방식으로 요소 선택하기 ===========================
			document.querySelector("#test").style.color = "red"
			// #test 태그를 클릭하면 클릭됨으로 내용을 변경
			document.querySelector("#test").onclick = function() {
				this.innerHTML = "클릭됨"
			}
			// h3 태그들의 글자색을 파란색으로 변경
			const h3arr = document.querySelectorAll("h3").style.color = "blue"
			for(let i=0; i<h3arr.length; i++){
				h3arr[i].style.color = "blue"
			}
			document.querySelectorAll("h3").forEach(el => {
				el.style.color = "blue"
			})
			 */
			// jQuery로 구현하기 =============================================
			$("#test").css("color", "red");
			$("#test").click(function() {
				$("#test").html("클릭됨")
			})
			$("h3").css("color", "blue")
		})
	</script>
	<div id="test">안녕하세요</div>
	<h3>H3태그1</h3>
	<h3>h3태그2</h3>
	<h3>H3태그3</h3>
</body>
</html>

<!DOCTYPE html>
<!--  /webapp/ajax/ex02_login.html 
   1. 로그인 버튼 클릭시 id,pass 값을 ex02_login.jsp 페이지로 전송
   2. ex02_login.jsp
      - member 테이블을 읽어 id,pass 검증
      - 일치 : 반갑습니다. name님 => message에 출력
         불일치 : 아이디 또는 비밀번호가 틀립니다. => message에 출력
-----------------------------------------------------------
   아이디 중복 버튼 클릭
      1. id 파라미미터 값을 ex02_iddup.jsp로 전송
      2. ex02_iddup.jsp
      - member 테이블을 읽기
      - 존재 : 존재하는 아이디 입니다. => message에 출력.
               입력된 id를 제거
         존재안함 : 회원가입이 가능한 아이디입니다. => message에 출력               

-->
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>
</head>
<body>
<form name="f">
아이디:<input type="text" id="id">
   <input type="button" value="아이디중복" id="btn"><br>
비밀번호:<input type="password" id="pass"><br>
   <input type="submit" value="로그인" id="loginbtn"><br>
</form>
<div id="message"></div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script type="text/javascript">
   $("#loginbtn").click(function(){
      let param = {id:$("#id").val(), pass:$("#pass").val()}
      $.ajax({
         url: "ex02_login.jsp",
         type : "POST",
         data : param,
         success : function(data) {
            $("#message").html(data)
         },
         error : function(e) {
            alert("서버오류: " + e.status)
         }
      })
      return false
   })
   $("#btn").click(function(){
      if($("#id").val() == ""){
         $("#message").html("아이디를 입력하세요.")
         return;
      }
      let param = {id:$("#id").val()}
      $.ajax({
         url : "ex02_iddup.jsp",
         type : "POST",
         data : param,
         success : function(data) {
            $("#message").html(data)
            if($("#result").is(".find")){
               $("#id").val("")
            }
         },
         error : function(e) {
            alert("서버 오류: " + e.status)
         }
      })
   })
</script>
</body>
</html>

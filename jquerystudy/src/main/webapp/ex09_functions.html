<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Function</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        .highlight-0 {background-color: red;}
        .highlight-1 {background-color: orange;}
        .highlight-2 {background-color: yellow;}
        .highlight-3 {background-color: green;}
        .highlight-4 {background-color: blue;}
    </style>
</head>
<body>
    <h3>each 메소드</h3>
    <p>
        배열의 모든 인덱스 순차적으로 접근할때 사용.<br>
        for in ,forEach  구분과 비슷
    </p>
    <script>
        const arr = ["동", "서", "남", "북"]
        // 1. for in
        console.log("for in =================")
        for(let i in arr) {
            console.log(i, typeof(i)) // i : 인덱스
            console.log(arr[i]) // 요소
        }
        console.log("forEach ================")
        // 2. forEach
        arr.forEach((item)=>console.log(item)) // 요소 출력

        console.log("each ===================")
        $.each(arr,function(index, value){ // jQuery 방식
            console.log(index, typeof(index)) // index: 첨자. 인덱스
            console.log(value) // 요소
        })
        console.log("each ===================")
        $(arr).each(function(index, value){ // $(arr): arr 배열을 jQuery 객체로 변경
            console.log(index, typeof(index))
            console.log(value)
        })


        console.log("자바스크립트 객체 =======")
        const student = {name:"홍길동", age:20, address:"서울"}
        console.log("for in =================")
        for(let key in student) {
            console.log(key, typeof(key))
            console.log(student[key])
        }
        console.log("each ===================")
        $.each(student, function(key, value){ // jQuery 방식
            console.log(key, typeof(key))
            console.log(value) // 요소
        })
        console.log("forEach ================") // forEach 문은 객체에 사용 ❌
        $(student).each(function(key, value){
            console.log(key, typeof(key))
            console.log(value)
        })

    </script>
<hr>    
<button id="btn">학생조회</button> <br><br>
<table id="result1" border="1">
    <thead><tr><th>이름</th><th>나이</th><th>주소</th></tr></thead>
    <tbody>
    <!-- 버튼 클릭시 조회된 학생정보를 출력하는 영역 -->
    <tr><td colspan="3" style="text-align:center">현재 학생정보가 없습니다.</td></tr>
    </tbody>
</table>    
<script>
    const students =[
        {name:"홍길동", age:20, address:"서울", phone:"010-1111-2222"}, 
        {name:"김말똥", age:30, address:"부산", phone:"010-5555-9999"}, 
        {name:"강개순", age:25, address:"광주", phone:"010-2222-0000"}
    ]
    $("#btn").click(function(){
        let result = ""
        $.each(students, function(index, stu){
            result += `<tr><td>${stu.name}</td><<td>${stu.age}</td><td>${stu.address}</td></tr>`
        })
        $("#result1 > tbody").html(result)
    })
</script>
<hr>    
<div id="area2">
    <h1>item-1</h1><h1>item-2</h1><h1>item-3</h1><h1>item-4</h1><h1>item-5</h1>
</div>
<script>
    /* 
     * $("#area2").children() : #area2의 하위 자손 객체들 => h1 태그 5개
     */

        $(this).addClass("highlight-" + index) //class 속성 추가
        // this.addClass("highlight-" + index) // 자바스크립트 객체에서 addClass 함수 사용❌. 실행 ❌
        // this.className = "highlight-" + index // class 속성 추가
        // $(this).className = "highlight-" + index // jQuery 객체에서는 사용 ❌. 실행 ❌
    })
</script>
<h3>is 메소드 </h3>
<p>
    $("선택자1").is("선택자2")<br>
    선택자1로 선택된 요소가  선택자2 와 일치 여부 리턴. 논리값 반환.
</p>
<h3 class="test">test1</h3>
<h3>test2</h3>
<h3 class="test">test3</h3>
<h3 class="test">test4</h3>
<h3>test5</h3>
<h3 class="test">test6</h3>
<script>
    // $("h3") : 모든 h3 태그들
    $("h3").each(function(){
        if($(this).is(".test")){
            $(this).css("backgroundColor", "orange")
        }
    })
    // 선택자로 변경
    $("h3.test").css("backgroundColor", "green")
</script>

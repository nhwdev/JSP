<!DOCTYPE html>
<!--  /webapp/ex08_create_remove.html  -->
<html>
<head>
<meta charset="UTF-8">
<title>Create_Remove</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        .item{
            background:yellowgreen;
            width:100px;
            height:100px;
            text-align:center;
            line-height:100px;
            margin:10px;
            font-size:25px;
            color:white;
            font-weight:bold;
        }
        .purple{
            background:purple;
        }
    </style>
</head>
<body>
<h1> 요소의 생성 </h1>
<h3>동적으로 요소 생성</h3>
<button id="btn">요소생성</button>
<div id="area1"></div>
<script>
    $("#btn").click(function(){
        // 1. 문자열로 생성
        let ele1 = "<p>Create Element by String</p>"
        // $("#area1").append(ele1)
        // 2. DOM 함수 이용 : createElement, createTextNode
        let ele2 = document.createElement("p")
        let text = document.createTextNode("Create Element by DOM")
        ele2.appendChild(text)
        // $("#area1").append(ele2)
        // 3. jQuery 방식으로 요소 생성
        let ele3 = $("<p></p>").text("Create Element by jQuery")
        // $("#area1").append(ele3);
        $("#area1").append(ele1, ele2, ele3)
        console.log(ele1)
        console.log(ele2)
        console.log(ele3)
    })
</script>
<h3>삽입 관련 메소드</h3>
<h1 id="test1"><span>A</span></h1>
<h1 id="test2"><span>A</span></h1>
<h1 id="test3"><span>A</span></h1>
<h1 id="test4"><span>A</span></h1>
<script>
    // $(A).append(B) : A 요소 내에 뒷부분에 B를 추가 (자손 / 하위)
    $("#test1").append("<span>B</span>")
    // $(A).append(B) : A 요소 내에 앞부분에 B를 추가 (자손 / 하위)
    $("#test2").prepend("<span>B</span>")
    // $(A).before(B) : A 요소 앞부분에 B를 추가 (동위)
    $("#test3").before("<span>B</span>")
    // $(A).after(B) : A 요소 뒷부분에 B를 추가 (동위)
    $("#test4").after("<span>B</span>")
    // $(B).appendTo(A) : B를 A 요소 내에 뒷부분에 하위 요소 추가
    $("<span>C</spna>").appendTo("#test1")
    // $(B).rependTo(A) : B를 A 요소 내에 앞부분에 하위 요소 추가
    $("<span>C</span>").prependTo("#test2")
    // $(B).insertAfter(A) : B를 A 요소 뒤에 추가 (동위)
    $("<span>C</span>").insertAfter("#test3")
    // $(B).insertBefore("A") : B를 A 요소 앞에 추가 (동위)
    $("<span>C</span>").insertBefore("#test4")
</script>
<hr>
<h3>요소 복제 메소드</h3>
<div id="clone-test">
    <div id="item1" class="item"><span>안녕</span></div>
</div>
<button id="clone">복제</button>
<div id="clone-result"></div>
<script>
    $(".item").hover(function(){
        $(this).addClass("purple") // addClass() : class 속성 추가. class="item purple" 추가
    }, function(){
        $(this).removeClass("purple") // removeClass() : class 속성 제거. class="item" 제거
    })
    $("#clone").click(function(){
        // $("#clone-result").append($("#item1")) // 복제가 아니고 이동
        // clone() : 요소 복제. 요소만 복제. 이벤트 복제 ❌
        // const copyEl = $("#item1").clone() // 요소 복제 ⭕, 요소에 등록된 이벤트 복제 ❌
        // $("#clone-result").append(copyEl)
        // clone(true) : 요소 복제 ⭕, 요소에 등록된 이벤트 복제 ⭕
        // $("#clone-result").append($("#item1").clone(true))
        // appendTO 함수를 이용한 복제
        $("#item1").clone(true).appendTo($("#clone-result"))
        
    })
</script>
<hr>
<h1>요소 제거</h1>
<h3>요소 객체 제거 및 잘라내기 메소드</h3>
<div id="remove-test">
    <div id="item2" class="item"><span>안녕</span></div>
    <h1>안녕하세요</h1>
</div>
<button id="empty">비우기</button>
<button id="remove">제거하기</button>
<button id="detach">잘라내기</button>
<div id="remove-result"></div>
<script>
    $(".item").hover(function(){
        $(this).addClass("purple")
    }, function(){
        $(this).removeClass("purple")
    })
    $("#empty").click(function(){
        $("#remove-test").empty() //#remove-test 내의 모든 요소를 제거
    })
    $("#remove").click(function(){
        const removeEl = $("#item2").remove() // 제거된 요소를 리턴. 이벤트 리턴 ❌
        $("#remove-test").append(removeEl)
    })
    $("#ㅇㄷㅅㅁ초").click(function(){
        const removeEl = $("#item2").detach() // 제거된 요소를 리턴. 이벤트 리턴 ⭕
        $("#remove-test").append(removeEl)
    })
</script>
</body>
</html>

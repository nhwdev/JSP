<!DOCTYPE html>
<!--  ex14_show.html -->
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>    
</head>
<body>
    <h3>* show(), hide(), toggle()</h3>
    <p>선택된 요소가 점점 커지면서 보여지고, 점점 작아지면서 사라지게 하는 메소드</p>
    <button id="hide">숨기기</button>
    <button id="show">보여주기</button>
    <button id="toggle">토글</button>
    <br><br>
    <div id="area" style="background:red; width:100px; height:100px;"></div> 
    <img id="flower" src="images/flower1.jpg" width="200">
    <script>
        $("#hide").click(function(){
            $("#flower").hide() // hide() : 요소를 안보이게
            $("#area").hide(3000) // hide(밀리초) : 밀리초 동안 요소를 안보이게
        })
        $("#show").click(function(){
            $("#flower").show(3000) // show() : 요소를 보이게
            $("#area").show(3000) // show(밀리초) : 밀리초 동안 요소를 보이게
        })
        $("#toggle").click(function(){
            $("#flower").toggle(3000) // toggle() : 요소가 보이면 안보이게, 안보이면 보이게
            $("#area").toggle(3000) // toggle(밀리초) : 밀리초 동안 요소를 보이게 또는 안보이게
        })
    </script>
</body>
</html>

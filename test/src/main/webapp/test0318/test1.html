<!DOCTYPE html>
<!-- /webapp/test0318/test1.html
   test1.html: ajax 통해 test1.jsp의 숫자 중 가장 큰값을 찾아 result 영역에 출력하기 
   test1.jsp : 0~99사이의 임의의 값을 10 개 생성하여 ,로 연결하여 전송하기
-->
<html>
<head>
<meta charset="UTF-8">
<title>AJAX Test</title>
<script
	src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
	<button id="btn1">XMLHttpRequest 객체</button>
	<script type="text/javascript">
		$("#btn1").click(
				function() {
					const xhttp = new XMLHttpRequest();
					xhttp.open("POST", "test1.jsp");
					xhttp.setRequestHeader("Content-type",
							"application/x-www-form-urlencoded;charset=UTF-8");
					xhttp.send();
					xhttp.onreadystatechange = function() {
						if (xhttp.readyState == 4 && xhttp.status == 200) {
							let result = xhttp.responseText
							let str = result
							let html = str + " 중 최대값 : "
							let arr = result.replace("[", "").replace("]", "").split(", ")
							let max = -1
							let min = 100
							for (let i = 0; i < arr.length; i++) {
								let num = Number(arr[i].trim())
								if (max < num) {
									max = num
									console.log("max : " + max)
								}
								if (num < min) {
									min = num
									console.log("min : " + min)
								}
							}
							html += max
							html += "<br>" + str + " 중 최소값 : " + min
							document.querySelector("#result").innerHTML = html
						}
					}
				})
	</script>
	<button id="btn2">fetch 함수</button>
	<script type="text/javascript">
		document.querySelector("#btn2").onclick = function(){
			fetch("test1.jsp")
			.then((r)=>r.json())
			.then((result)=>{
				console.log(result)
			})
		}
	</script>
	<button id="btn3">jQuery</button>
	<div id="result"></div>
</body>
</html>
